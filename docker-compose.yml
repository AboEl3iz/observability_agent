version: '3.8'

# ── eBPF Observability Stack ──────────────────────────────────────────────────
#
# Services:
#   observer   — eBPF agent: collects metrics, exposes :8080/metrics
#   prometheus — scrapes :8080/metrics every 5s
#   grafana    — visualises Prometheus data on :3000 (admin/admin)
#
# Usage:
#   docker-compose build          # build ebpf-observer image
#   docker-compose up -d          # start full stack
#   docker-compose logs -f observer  # tail agent logs
#   docker-compose down           # stop everything
#
# Ports:
#   :8080  — eBPF observer metrics + health (/healthz)
#   :9090  — Prometheus UI
#   :3000  — Grafana UI (admin / admin)

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}

services:

  # ── eBPF Observability Agent ───────────────────────────────────────────────
  ebpf-observer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ebpf-observer:latest
    container_name: ebpf_observer
    hostname: ebpf-observer
    # Required for eBPF: share host PID namespace and network stack
    pid: "host"
    network_mode: "host"
    cap_add:
      - BPF
      - PERFMON
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_READ_SEARCH
      - NET_ADMIN
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    environment:
      - GOMAXPROCS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ebpf_prometheus
    # NOTE: ebpf-observer uses network_mode:host so prometheus must reach it
    # via the host network too, or via host.docker.internal / gateway IP.
    # We use host networking here for simplicity in the test stack.
    network_mode: "host"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      ebpf-observer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ebpf_grafana
    network_mode: "host"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_ANALYTICS_REPORTING_ENABLED=false
      # Pre-configure the Prometheus datasource via env
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
